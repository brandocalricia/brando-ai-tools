<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brando for YouTube</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">&#9789;</button>
    <!-- Auth Screen -->
    <div id="auth-screen">
      <div class="auth-header">
        <h1>Brando</h1>
        <p class="auth-subtitle">AI-powered YouTube summaries</p>
      </div>

      <div id="auth-error" class="error hidden"></div>

      <div id="login-form">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" placeholder="Min 6 characters">
        <button id="login-btn" class="btn-primary">Log in</button>
        <button id="forgot-btn" class="btn-link">Forgot password?</button>
        <button id="signup-btn" class="btn-secondary">Create account</button>
      </div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="main-app" class="hidden">
      <div class="header">
        <h1>Brando <span class="header-sub">YouTube</span></h1>
        <div class="header-right">
          <div id="usage-badge" class="usage-badge">5/5 left</div>
          <button id="logout-btn" class="btn-logout" title="Log out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="video-input-group">
        <label for="video-url">YouTube URL</label>
        <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=...">
        <p id="video-detected" class="video-detected hidden">Current tab detected</p>
      </div>

      <div class="row">
        <div class="field">
          <label for="summary-style">Style</label>
          <select id="summary-style">
            <option value="tldr">TL;DR</option>
            <option value="bullet" selected>Key takeaways</option>
            <option value="timestamps">Timestamps</option>
            <option value="detailed">Detailed notes</option>
          </select>
        </div>
        <div class="field">
          <label for="summary-length">Length</label>
          <select id="summary-length">
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
          </select>
        </div>
      </div>

      <button id="summarize-btn" class="btn-primary">Summarize video</button>

      <div id="output-area" class="output-area hidden">
        <div class="output-header">
          <span class="output-label">Summary</span>
          <div class="output-actions">
            <button id="copy-btn" class="btn-icon" title="Copy to clipboard">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button id="regen-btn" class="btn-icon" title="Regenerate">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="output-text" class="output-text"></div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Summarizing video...</span>
      </div>

      <div id="error" class="error hidden"></div>

      <div id="upgrade-prompt" class="upgrade-prompt hidden">
        <p>You've used all 5 free summaries today.</p>
        <button id="upgrade-btn" class="btn-upgrade">Upgrade YouTube Pro — $3.99/mo</button>
        <button id="bundle-btn" class="btn-bundle">Get all 5 Brando tools — $14.99/mo</button>
        <span class="upgrade-sub">Save 25% with the bundle vs buying individually</span>
      </div>

      <div class="footer">
        <span id="user-email" class="user-email"></span>
        <a id="footer-upgrade" href="#" class="footer-upgrade">Upgrade to Pro</a>
        <span id="plan-label" class="plan-label">Free plan</span>
      </div>

      <div class="brando-more">
        <span>More AI tools by Brando</span>
        <div class="brando-links">
          <a href="#">LinkedIn</a>
          <a href="#">Gmail</a>
          <a href="#">Job Search</a>
          <a href="#">Shopping</a>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
